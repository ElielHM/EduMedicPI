{% extends "sitio/estructura.html" %}
{% block titulo %}Realidad Virtual{% endblock titulo %}
{% block contenido %}
{% load static %}
<script>
    const menuuu= document.getElementById('notasnav');
    menuuu.classList.add("active")
</script>
<div class="aframe">
<a-scene embedded>
   
  <a-camera>
            <a-cursor
                geometry="primitive: circle; radius:0.01 px"
                color="#ACCBE8"
                raycaster="objects: .point"
                fuse="true"
                fusetimeout="500"
            ></a-cursor>
        </a-camera>

       <a-asssets>
            <!--Botones-->
            <image
                src="{% static "sitio/img/back.png" %}"
                id="back"
             ></image>
            <a-gltf-model
                src="{% static "sitio/img/cuerpo_femenino_desnudo.glb" %}"
                id="modelo"
            ></a-gltf-model>
     
        </a-asssets>

        <a-plane
            transparent="true"
            position="-7, 5, -5"
            class=". point"
            onclick="window.location.href='{% url "RV" %}'"
            src="#back"onmouseenter="document.querySelector('#ayudap').setAttribute('visible', true)"
           onmouseleave="document.querySelector('#ayudap').setAttribute('visible', false)"
        >
            <a-entity
           position="1, -1, 0"
           text="
                align: center;
                color: #D3D5D3;
                value: Regresar;
                width:5
               "
           visible="false"
           id="ayudap"
       ></a-entity>
        </a-plane>

        <!--Frontal-->
        <a-plane
            color="lightpink"
            position="0, 2, -4.9"
           width="5" height="7"
        >
         <a-entity
           text="
                align: center;
                color: #white;
                value: Coronal/Frontal;
                width:7
               "
               rotation="0, 0, 90"
                position="1.5, -0.7, 0"
                id="planox"
                visible="true"
       ></a-entity>
        </a-plane>
       <a-plane
            color="lightpink"
            position="0, 2, -4.9"
            rotation= "-180, 0, 0"
           width="5" height="7"
        >
    <a-entity
           text="
                align: center;
                color: #white;
                value: Coronal/Frontal;
                width:7
               "
               rotation="0, 0, 90"
                position="1.5, -0.7, 0"
                visible="true"
       ></a-entity></a-plane>


        <!--TRANSversal-->
        <a-plane
            width="5" height="7"
            rotation="90, 0, 0"
            position="0, 2.5, -5"
            color="lightgreen"
        ><a-entity
           text="
                align: center;
                color: #white;
                value: Tranversal;
                width:5
               "
               rotation="-90, 0, 0"
                position="0, 4, 0"
                visible="true"
       ></a-entity> </a-plane>
        

        <!--Sagital-->
        <a-plane
            width="5" height="7"
            position="0, 2, -5"
            rotation="0, 90, 0"
            color="blue"
        ><a-entity
           text="
                align: center;
                color: #white;
                value: Sagital;
                width:7
               "
               rotation="0, 0, 90"
                position="-1.5, -0.7, 0"
                visible="true"
       ></a-entity></a-plane>

        <a-plane
            width="5" height="7"
            position="0, 2, -5"
            rotation="0, -90, 0"
            color="blue"
        ><a-entity
           text="
                align: center;
                color: #white;
                value: Sagital;
                width:7
               "
               rotation="0, 0, 90"
                position="1.5, -0.7, 0"
                id="sag"
                visible="true"
       ></a-entity></a-plane>

         <a-entity gltf-model="#modelo"
             rotation="0, 0, 0"
             position="0, -1, -5"
             scale="0.4, 0.4, 0.4"
         ></a-entity>
   
</a-scene>
</div>

{% endblock contenido %}
