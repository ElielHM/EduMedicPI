<head>
    {% load static %}
      <meta charset="UTF-8">
      <title>Iniciar Sesión</title>
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="icon" type="image/x-icon" href="{% static "sitio/img/favicon.ico" %}">
      
  <link href="{% static 'sitio/css/bootstrap.css' %}" rel="stylesheet">
  <link href="{% static 'sitio/css/bootstrap-icons.css' %}" rel="stylesheet">
  <link href="{% static 'sitio/css/glightbox.css' %}" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="{% static "sitio/img/favicon.ico" %}">
  <link href="{% static 'sitio/css/swiper-bundle.min.css' %}" rel="stylesheet">
  <link href="{% static 'sitio/css/main.css' %}" rel="stylesheet" >
  <link href="{% static 'sitio/css/mainn.css' %}" rel="stylesheet">
  <link href="{% static 'sitio/css/animate.css' %}" rel="stylesheet">
  <script src="{% static "sitio/js/aframe.js" %}"></script>
  <script src="{% static "sitio/js/mainn.js" %}"></script>
  <script src="{% static "sitio/js/boootstrap.bundle.min.js" %}"></script>
      <link href="{% static 'sitio/css/style.css' %}" rel="stylesheet">
</head>
      
{% block contenido %}
<body style="overflow: hidden;">

    <div class="navbar-area">
        <div class="container">
          <div class="row align-items-center">
            <div class="col-lg-12">

              <nav class="navbar navbar-expand-lg">
                <a id="inicie" class="navbar-brand" href="{% url "Inicio" %}">
                  <img src="{% static "sitio/img/logo.svg" %}" title="Inicio" alt="EduMedic" />
                </a>
                <button
                  class="navbar-toggler"
                  type="button"
                  data-bs-toggle="collapse"
                  data-bs-target="#navbarSupportedContent"
                  aria-controls="navbarSupportedContent"
                  aria-expanded="false"
                  aria-label="Toggle navigation"
                >
                  <span class="toggler-icon"></span>
                  <span class="toggler-icon"></span>
                  <span class="toggler-icon"></span>
                </button>

                <div
                  class="collapse navbar-collapse sub-menu-bar"
                  id="navbarSupportedContent"
                >
                  <ul id="nav" class="navbar-nav ms-auto">
                    <li class="nav-item">
                      <a id="aboutUs" style="color:white" class="page-scroll" href="{% url "AboutUs" %}">Nosotros</a>
                    </li>
                    <li class="nav-item">
                      <a id="biblioteca" style="color:#d0d0d0;pointer-events: none" class="page-scroll">Biblioteca</a>
                    </li>
                    <li class="nav-item">
                      <a id="medicamentos" style="color:#d0d0d0;pointer-events: none" class="page-scroll" >Medicamentos</a>
                    </li>
                    <li class="nav-item">
                      <a id="rv" style="color:#d0d0d0;pointer-events: none" class="page-scroll">Modelos 3D</a>
                    </li>
                    <li class="nav-item">
                      <a id="notasnav" style="color:#d0d0d0;pointer-events: none" class="page-scroll " >Notas</a>
                    </li>
                   
                    </li>

                  </ul>
                </div>
                <!-- navbar collapse -->
              </nav>
              <!-- navbar -->
            </div>
          </div>
          <!-- row -->
        </div>
        <!-- container -->
      </div>

      
    </div>
    <div class="login-container">
        
        
        <div class="login-card">
            <div class="login-header">
                <h2>Bienvenid@</h2>
                <p>Ingresa los datos de tu cuenta</p>
            </div>
            
            <form class="login-form" id="logInForm" method="POST" action="{% url 'validarLogin' %}" novalidate>
                {% csrf_token %}
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="text" id="email" name="email" autocomplete="off" required >
                        <label for="email">Correo electrónico</label>
                        <span class="focus-border"></span>
                    </div>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <div class="input-wrapper password-wrapper">
                        <input type="password" id="password" name="password" required >
                        <label for="password">Contraseña</label>
                        <button type="button" onclick="mostrarPass()" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
                            <span class="eye-icon"></span>
                        </button>
                        <span class="focus-border"></span>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-options">
                    <label class="remember-wrapper">
                        <input type="checkbox" id="remember" name="remember">
                        <span class="checkbox-label">
                            <span class="checkmark"></span>
                                Recordarme
                        </span>
                    </label>
                    <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="login-btn btn">
                    <span class="btn-text">Ingresar</span>
                </button>
            <div style="margin-top: -24px;margin-bottom: -24px;" class="errorFin" id="errorFin"><p style="text-align: center;" class="error-message" id="errorNF"></p></div>
            <div style="margin-top: -24px;margin-bottom: -24px;" class="errorFin" id="successFin"><p style="text-align: center;" class="successSign" id="successSU"></p></div>
            
            
            
            <div class="success-message" id="successMessage">
                <div class="success-icon" id="successIcon"></div>
                <h3 id="successHead"></h3>
                <p id="successText"></p>
            </div>
            </form>
            <div class="signup-link">
                <p>¿No tienes una cuenta? <a href="{%url 'Signup'%}">Crear una</a></p>
            </div>
        </div>
    </div>
    
      <script src="{% static "sitio/js/login.js" %}"></script>
</body>
{% endblock contenido %}
